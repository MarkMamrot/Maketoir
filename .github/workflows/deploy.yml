name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy-output

          # Copy the standalone bundle (server.js + bundled node_modules)
          cp -r .next/standalone/. deploy-output/

          # Prepend explicit dotenv load so Passenger always finds .env
          printf '%s\n' "require('dotenv').config({ path: require('path').join(__dirname, '.env') });" | cat - deploy-output/server.js > deploy-output/server.tmp && mv deploy-output/server.tmp deploy-output/server.js

          # Copy static client assets (not included in standalone by default)
          mkdir -p deploy-output/.next/static
          cp -r .next/static/. deploy-output/.next/static/

          # Copy public folder
          if [ -d "public" ]; then
            cp -r public/. deploy-output/public/
          fi

          # Touch restart.txt — signals Phusion Passenger to restart after deploy
          mkdir -p deploy-output/tmp
          touch deploy-output/tmp/restart.txt

      - name: Deploy via FTP to marketoir-live
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy-output/
          server-dir: marketoir-live/
          exclude: |
            **/.env
            **/.env.*
            **/.git*
            **/.git*/**

      - name: Summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Files uploaded via FTP to \`/marketoir-live/\`" >> $GITHUB_STEP_SUMMARY
          echo "Source commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Phusion Passenger restart triggered via \`tmp/restart.txt\`" >> $GITHUB_STEP_SUMMARY

          echo "cPanel will now pull the deploy branch and copy files to \`/home/readyedu/marketoir-live\`." >> $GITHUB_STEP_SUMMARY
