name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required so the workflow can push to the deploy branch
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy-output

          # Copy the standalone bundle (includes server.js + bundled node_modules)
          cp -r .next/standalone/. deploy-output/

          # Copy static client assets (not included in standalone by default)
          mkdir -p deploy-output/.next/static
          cp -r .next/static/. deploy-output/.next/static/

          # Copy public folder
          if [ -d "public" ]; then
            cp -r public/. deploy-output/public/
          fi

          # Write the .cpanel.yml for the deploy branch (printf avoids heredoc indentation issues)
          printf '%s\n' \
            '---' \
            'deployment:' \
            '  tasks:' \
            '    - export DEPLOYPATH=/home/readyedu/marketoir-live' \
            '    - /bin/cp -R ./* $DEPLOYPATH' \
            '    - /bin/cp -R ./.next $DEPLOYPATH/' \
            '    - /bin/cp ./.cpanel.yml $DEPLOYPATH/' \
            '    - mkdir -p $DEPLOYPATH/tmp && touch $DEPLOYPATH/tmp/restart.txt' \
            > deploy-output/.cpanel.yml

      - name: Push to deploy branch (orphan — no history accumulation)
        run: |
          cd deploy-output

          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git checkout -b deploy

          git add -A
          git commit -m "Deploy build from commit ${{ github.sha }}"

          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push --force origin deploy

      - name: Summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`deploy\`" >> $GITHUB_STEP_SUMMARY
          echo "Source commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "cPanel will now pull the deploy branch and copy files to \`/home/readyedu/marketoir-live\`." >> $GITHUB_STEP_SUMMARY
