name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy-output

          # Copy the standalone bundle (server.js + bundled node_modules)
          cp -r .next/standalone/. deploy-output/

          # Prepend dotenv load + uncaughtException logger so startup errors write to startup-error.log
          cat > /tmp/prepend.js << 'PREPEND'
var fs = require('fs');
var path = require('path');
var logFile = path.join(__dirname, 'startup-error.log');
process.on('uncaughtException', function(err) {
  fs.appendFileSync(logFile, new Date().toISOString() + ' UNCAUGHT: ' + (err && err.stack ? err.stack : String(err)) + '\n');
  process.exit(1);
});
process.on('unhandledRejection', function(reason) {
  fs.appendFileSync(logFile, new Date().toISOString() + ' REJECTION: ' + (reason && reason.stack ? reason.stack : String(reason)) + '\n');
});
try {
  require('dotenv').config({ path: path.join(__dirname, '.env') });
} catch(e) {
  fs.appendFileSync(logFile, new Date().toISOString() + ' DOTENV ERROR: ' + e.stack + '\n');
}
PREPEND
          cat /tmp/prepend.js deploy-output/server.js > deploy-output/server.tmp && mv deploy-output/server.tmp deploy-output/server.js

          # Copy static client assets (not included in standalone by default)
          mkdir -p deploy-output/.next/static
          cp -r .next/static/. deploy-output/.next/static/

          # Copy public folder
          if [ -d "public" ]; then
            cp -r public/. deploy-output/public/
          fi

          # Touch restart.txt — signals Phusion Passenger to restart after deploy
          mkdir -p deploy-output/tmp
          touch deploy-output/tmp/restart.txt

          # Copy dotenv into standalone bundle (not auto-traced; needed by server.js startup)
          mkdir -p deploy-output/node_modules
          cp -r node_modules/dotenv deploy-output/node_modules/

      - name: Deploy via LFTP to marketoir-live
        run: |
          sudo apt-get install -y lftp
          lftp -c "
          set ftp:ssl-allow no;
          set net:timeout 60;
          set net:max-retries 5;
          set net:reconnect-interval-base 5;
          open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ftp.exam-ready.com.au;
          put ./deploy-output/server.js -o marketoir-live/server.js;
          put ./deploy-output/package.json -o marketoir-live/package.json;
          rm -rf marketoir-live/.next/;
          mirror --reverse --verbose \
            --parallel=10 \
            --ignore-time \
            --exclude .env \
            --exclude .env.local \
            --exclude-glob '*.git*' \
            --exclude server.js \
            --exclude package.json \
            ./deploy-output/ marketoir-live/;
          bye
          "

      - name: Summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Files uploaded via FTP to \`/marketoir-live/\`" >> $GITHUB_STEP_SUMMARY
          echo "Source commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Phusion Passenger restart triggered via \`tmp/restart.txt\`" >> $GITHUB_STEP_SUMMARY

          echo "cPanel will now pull the deploy branch and copy files to \`/home/readyedu/marketoir-live\`." >> $GITHUB_STEP_SUMMARY
