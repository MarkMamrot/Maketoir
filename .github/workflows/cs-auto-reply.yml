name: Customer Service Auto-Reply

on:
  schedule:
    - cron: '*/15 * * * *'   # fires every 15 min; route throttles to the user-configured interval
  workflow_dispatch:          # Manual trigger from GitHub Actions UI

jobs:
  auto-reply:
    runs-on: ubuntu-latest
    steps:
      - name: Run CS auto-reply for all enabled businesses
        run: |
          # No business ID needed — the route iterates all businesses automatically.
          # Each business's config (CSAutoReplyEnabled, CSAutoReplyIntervalMins) is
          # checked individually, so only businesses that opted in are processed.
          BODY=$(curl -s -L -w '\n__STATUS__%{http_code}' \
            -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.APP_URL }}/api/customer-service/auto-reply")
          RESPONSE=$(echo "$BODY" | tail -1 | sed 's/__STATUS__//')
          RESPONSE_BODY=$(echo "$BODY" | head -n -1)
          echo "HTTP status: $RESPONSE"
          echo "Response: $RESPONSE_BODY"
          [ "$RESPONSE" = "200" ] || exit 1
