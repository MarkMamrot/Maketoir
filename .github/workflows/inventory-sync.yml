name: Shopify Inventory Sync (drain queue)

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes — keeps Shopify stock current
  workflow_dispatch:          # Manual trigger from GitHub Actions UI

jobs:
  drain:
    runs-on: ubuntu-latest
    steps:
      - name: Drain IMS → Shopify inventory queue
        run: |
          RESPONSE=$(curl -s -L -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"mode":"queue","limit":4000}' \
            "${{ secrets.APP_URL }}/api/ims/shopify/sync-inventory")
          echo "HTTP status: $RESPONSE"
          [ "$RESPONSE" = "200" ] || exit 1
